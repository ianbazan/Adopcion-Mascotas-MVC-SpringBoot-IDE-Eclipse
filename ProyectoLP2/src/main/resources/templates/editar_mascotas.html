<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Editar Mascota</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item active">
                    <a class="nav-link" href="/">Control de Mascotas</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/nuevo">Agregar Mascota</a>
                </li>
            </ul>
        </div>
    </nav>

    <br />

    <div class="container">
        <div class="row">
            <div class="col-lg-6 col-md-6 col-sm-6 container justify-content-center card">
                <h1 class="text-center">Editar Mascota</h1>
                <div class="card-body">
                    <form th:action="@{/guardar}" th:object="${mascotas}" method="post">
                        <div class="form-group">
                            <label>ID de Mascota: </label>
                            <input type="text" name="mascota_id" th:field="*{mascota_id}" class="form-control" readonly="readonly" />
                        </div>
                        <div class="form-group">
                            <label>Nombre: </label>
                            <input type="text" name="nombre" th:field="*{nombre}" class="form-control" placeholder="Ingrese el nombre de la mascota" required />
                        </div>
                        <div class="form-group">
                            <label>Especie: </label>
                            <input type="text" name="especie" th:field="*{especie}" class="form-control" placeholder="Ingrese la especie de la mascota" required />
                        </div>
                        <div class="form-group">
                            <label>Raza: </label>
                            <input type="text" name="raza" th:field="*{raza}" class="form-control" placeholder="Ingrese la raza de la mascota" required />
                        </div>
                        <div class="form-group">
                            <label>Descripción: </label>
                            <input type="text" name="descripcion" th:field="*{descripcion}" class="form-control" placeholder="Ingrese la descripción de la mascota" required />
                        </div>
                        <div class="form-group">
                            <label>Fecha de Registro: </label>
                            <input type="date" name="fecha_registro" th:field="*{fecha_registro}" class="form-control" required />
                        </div>
                        <div class="form-group">
                            <label>Refugio: </label>
                            <select name="refugio" th:field="*{refugio}" class="form-control">
                                <option th:each="refugio : ${refugios}" th:value="${refugio}" th:text="${refugio.nombre}"></option>
                            </select>
                        </div>
                        <div class="box-footer">
                            <button class="btn btn-success">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
